<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>h2h洛杉矶签售 · 清新监控看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f4f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 1.5rem 1.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
            flex-wrap: wrap;
        }

        h1::before {
            content: "🎟️";
            font-size: 1.8rem;
        }

        /* 指标卡片：默认四列，手机下一列 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem 1.2rem;
            box-shadow: 0 8px 20px -6px rgba(0, 32, 64, 0.08);
            transition: all 0.2s ease;
            border: 1px solid rgba(226, 232, 240, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .stat-value input {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            border: none;
            background: #f1f5f9;
            padding: 0.2rem 0.8rem;
            width: 130px;
            border-radius: 1rem;
            outline: 2px solid transparent;
            transition: outline 0.15s, background 0.15s;
            font-family: inherit;
        }

        .stat-value input:focus {
            outline: 2px solid #94a3b8;
            background: #ffffff;
        }

        .readonly-value {
            background: #f1f5f9;
            padding: 0.2rem 1.2rem;
            border-radius: 1rem;
            color: #1e293b;
            font-size: 1.8rem;
            min-width: 80px;
            text-align: center;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .cut-value {
            background: #e6f0ff;
            color: #1e4a7a;
            font-weight: 700;
        }

        .total-value {
            background: #f0f3f8;
            color: #0b3b5c;
            font-weight: 600;
        }

        .hint {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            border-top: 1px dashed #e2e8f0;
            padding-top: 0.4rem;
        }

        /* 表格卡片 */
        .table-section {
            background: white;
            border-radius: 1.8rem;
            padding: 1.5rem;
            box-shadow: 0 8px 26px -8px rgba(0, 34, 68, 0.1);
            border: 1px solid #e9eef3;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .table-header h2 {
            font-size: 1.3rem;
            font-weight: 550;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .table-header h2 span {
            background: #e9eef3;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
        }

        .update-badge {
            background: #dbeafe;
            color: #1e4b8b;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 2px 6px rgba(0,69,145,0.06);
            white-space: nowrap;
        }

        /* 表格容器：固定高度 + 纵向滚动条 */
        .table-wrapper {
            border-radius: 1.2rem;
            border: 1px solid #ecf1f7;
            background: #fafdff;
            max-height: 400px;
            overflow-y: auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 600px;
        }

        th {
            text-align: left;
            padding: 0.9rem 1rem;
            background: #f8fafd;
            color: #334155;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.02em;
            border-bottom: 1px solid #dde3ea;
            position: sticky;
            top: 0;
            background-color: #f8fafd;
            z-index: 10;
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #eef2f6;
            color: #1f2a41;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover td {
            background-color: #f0f7ff;
            transition: background 0.15s;
        }

        .sales-positive {
            color: #2b6e4f;
            font-weight: 550;
            background: #e3f2ed;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            display: inline-block;
        }

        .sales-negative {
            color: #b13e4b;
            font-weight: 550;
            background: #ffe9eb;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            display: inline-block;
        }

        .stock-change {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #f0f3f8;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .empty-row td {
            padding: 2rem;
            text-align: center;
            color: #94a3b8;
            font-style: italic;
        }

        .footer-note {
            margin-top: 0.8rem;
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #86b9eb;
            border-radius: 10px;
            display: inline-block;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* 响应式设计：手机屏幕下卡片堆叠为一列，字号微调 */
        @media screen and (max-width: 640px) {
            .dashboard {
                padding: 1rem;
                border-radius: 1.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;  /* 一列布局 */
                gap: 0.8rem;
            }
            .stat-value {
                font-size: 1.5rem;
            }
            .stat-value input {
                font-size: 1.5rem;
                width: 110px;
            }
            .readonly-value {
                font-size: 1.5rem;
                padding: 0.2rem 1rem;
            }
            .table-section {
                padding: 1rem;
            }
            .table-header h2 {
                font-size: 1.1rem;
            }
            .update-badge {
                font-size: 0.7rem;
                padding: 0.3rem 0.8rem;
            }
            .table-wrapper {
                max-height: 350px;
            }
            th, td {
                padding: 0.7rem 0.8rem;
                font-size: 0.8rem;
            }
            .stock-change {
                font-size: 0.75rem;
            }
            .footer-note {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>h2h 洛杉矶线下签售cut</h1>

        <!-- 指标卡片：四列 -->
        <div class="stats-grid">
            <!-- 注水阈值（用户可填正整数） -->
            <div class="stat-card">
                <div class="stat-label">💧 注水阈值</div>
                <div class="stat-value">
                    <input type="number" id="thresholdInput" min="1" value="5" step="1" aria-label="注水阈值，正整数">
                </div>
                <div class="hint">输入正整数，用于计算推荐 cut</div>
            </div>

            <!-- 名额人数（仅显示，不可修改） -->
            <div class="stat-card">
                <div class="stat-label">👥 名额人数</div>
                <div class="stat-value">
                    <span class="readonly-value" id="quotaDisplay">50</span>
                </div>
                <div class="hint">本场活动名额总人数</div>
            </div>

            <!-- 推荐cut（仅显示，动态计算） -->
            <div class="stat-card">
                <div class="stat-label">📐 推荐 cut</div>
                <div class="stat-value">
                    <span class="readonly-value cut-value" id="cutDisplay">—</span>
                </div>
                <div class="hint">推荐数量，仅供参考</div>
            </div>

            <!-- 新增：总销量（仅显示，不可修改） -->
            <div class="stat-card">
                <div class="stat-label">📊 总销量</div>
                <div class="stat-value">
                    <span class="readonly-value total-value" id="totalSalesDisplay">0</span>
                </div>
                <div class="hint">本场活动的总销售量</div>
            </div>
        </div>

        <!-- 销量变化表格卡片 -->
        <div class="table-section">
            <div class="table-header">
                <h2>
                    📋 销量变化实时记录
                    <span id="rowCountBadge">0 条</span>
                </h2>
                <div class="update-badge">
                    <span class="dot"></span>
                    <span id="lastUpdate">更新于 等待数据…</span>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>商品名称</th>
                            <th>库存变化</th>
                            <th>单笔销量</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="empty-row"><td colspan="4">⏳ 加载 CSV 数据中…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="footer-note">
                <span>🔄 每 5 秒自动刷新</span>
                <span>📁 数据源: h2h洛杉矶线下签售.csv</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 配置 ----------
            const CSV_URL = 'h2h洛杉矶线下签售.csv';
            const REFRESH_INTERVAL = 5000;
            const FIXED_QUOTA = 50;                    // 名额人数，可根据实际情况修改

            // DOM 元素
            const thresholdInput = document.getElementById('thresholdInput');
            const quotaDisplay = document.getElementById('quotaDisplay');
            const cutDisplay = document.getElementById('cutDisplay');
            const totalSalesDisplay = document.getElementById('totalSalesDisplay');
            const tableBody = document.getElementById('tableBody');
            const lastUpdateSpan = document.getElementById('lastUpdate');
            const rowCountBadge = document.getElementById('rowCountBadge');

            // 状态
            let currentThreshold = 5;
            let salesData = [];

            // 初始化显示名额
            quotaDisplay.textContent = FIXED_QUOTA;

            // ---------- 工具函数：解析CSV ----------
            function parseCSV(text) {
                let cleaned = text.replace(/^\uFEFF/, '');
                const lines = cleaned.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length === 0) return [];

                const dataRows = lines.slice(1);
                const result = [];

                for (const row of dataRows) {
                    const cols = row.split(',');
                    if (cols.length < 4) continue;

                    const time = cols[0].trim();
                    const product = cols[1].trim();
                    const change = cols[2].trim();
                    const saleRaw = cols[3].trim();

                    const saleValue = parseInt(saleRaw, 10);
                    if (isNaN(saleValue)) continue;

                    result.push({ time, product, change, saleValue });
                }
                return result;
            }

            // ---------- 渲染表格 ----------
            function renderTable(data) {
                if (!data || data.length === 0) {
                    tableBody.innerHTML = `<tr class="empty-row"><td colspan="4">📭 暂无销量记录，请确认CSV文件存在且非空</td></tr>`;
                    rowCountBadge.textContent = '0 条';
                    return;
                }

                let html = '';
                data.forEach(row => {
                    const saleClass = row.saleValue >= 0 ? 'sales-positive' : 'sales-negative';
                    const sign = row.saleValue > 0 ? '+' : '';
                    html += `<tr>
                        <td>${row.time}</td>
                        <td>${row.product}</td>
                        <td><span class="stock-change">${row.change}</span></td>
                        <td><span class="${saleClass}">${sign}${row.saleValue}</span></td>
                    </tr>`;
                });
                tableBody.innerHTML = html;
                rowCountBadge.textContent = `${data.length} 条`;
            }

            // ---------- 计算推荐cut ----------
            function computeRecommendedCut(data, threshold, quota) {
                if (!data || data.length === 0 || quota === 0) return '—';
                const filtered = data.filter(item => Math.abs(item.saleValue) <= threshold);
                if (filtered.length === 0) return '0.00';
                const sum = filtered.reduce((acc, cur) => acc + cur.saleValue, 0);
                return (sum / quota).toFixed(2);
            }

            // ---------- 计算总销量 ----------
            function computeTotalSales(data) {
                if (!data || data.length === 0) return 0;
                return data.reduce((acc, cur) => acc + cur.saleValue, 0);
            }

            // ---------- 更新所有UI ----------
            async function fetchAndUpdate() {
                try {
                    const response = await fetch(`${CSV_URL}?t=${Date.now()}`);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const csvText = await response.text();

                    const newData = parseCSV(csvText);
                    salesData = newData;

                    renderTable(salesData);

                    const now = new Date();
                    lastUpdateSpan.textContent = `更新于 ${now.toLocaleTimeString()}`;

                    // 更新推荐cut
                    const cutValue = computeRecommendedCut(salesData, currentThreshold, FIXED_QUOTA);
                    cutDisplay.textContent = cutValue;

                    // 更新总销量
                    const total = computeTotalSales(salesData);
                    totalSalesDisplay.textContent = total;

                } catch (error) {
                    console.warn('CSV获取失败:', error);
                    tableBody.innerHTML = `<tr class="empty-row"><td colspan="4">❌ 读取CSV失败: ${error.message}，请确认文件存在且可访问</td></tr>`;
                    rowCountBadge.textContent = 'error';
                    lastUpdateSpan.textContent = '更新失败';
                    salesData = [];
                    cutDisplay.textContent = '—';
                    totalSalesDisplay.textContent = '0';
                }
            }

            // ---------- 监听阈值变化 ----------
            thresholdInput.addEventListener('input', function(e) {
                let val = parseInt(e.target.value, 10);
                if (isNaN(val) || val < 1) {
                    val = 1;
                    thresholdInput.value = 1;
                }
                currentThreshold = val;

                if (salesData.length > 0) {
                    cutDisplay.textContent = computeRecommendedCut(salesData, currentThreshold, FIXED_QUOTA);
                } else {
                    cutDisplay.textContent = '—';
                }
            });

            thresholdInput.addEventListener('blur', function() {
                let val = parseInt(this.value, 10);
                if (isNaN(val) || val < 1) {
                    this.value = 1;
                    currentThreshold = 1;
                } else {
                    currentThreshold = val;
                }
                if (salesData.length > 0) {
                    cutDisplay.textContent = computeRecommendedCut(salesData, currentThreshold, FIXED_QUOTA);
                }
            });

            // 启动
            fetchAndUpdate();
            setInterval(fetchAndUpdate, REFRESH_INTERVAL);
        })();
    </script>
</body>
</html>
